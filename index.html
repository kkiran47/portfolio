<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kiran's Portfolio</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css" />
    
    <style>
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        .cursor-blink { animation: blink 1s step-end infinite; }
        .scanlines {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            background-size: 100% 4px;
            z-index: 100;
            pointer-events: none;
        }
        .glow-text { text-shadow: 0 0 8px rgba(0, 230, 57, 0.6); }
        .matrix-border { border: 1px solid #3b4b37; }
        .matrix-border:hover { border-color: #00e639; box-shadow: 0 0 15px rgba(0, 230, 57, 0.2); }
        body { background-color: #000000; color: #dae6d2; overflow-x: hidden; margin: 0; padding: 0; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #008F11; }
        
        /* New Styles */
        .crt-glow { text-shadow: 0 0 5px rgba(0, 230, 57, 0.7); }
        .matrix-glow { text-shadow: 0 0 10px rgba(0, 230, 57, 0.6); }
        .terminal-window { border: 1px solid #3b4b37; position: relative; }
        .terminal-header { border-bottom: 1px solid #3b4b37; background: rgba(24, 34, 22, 0.5); }
        .cursor { display: inline-block; width: 8px; height: 18px; background-color: #00e639; animation: blink 1s infinite; vertical-align: middle; }
        .glow-green:hover { box-shadow: 0 0 15px rgba(0, 230, 57, 0.3); border-color: #00e639; }
        .terminal-border { border: 1px solid #3b4b37; }
        .terminal-btn:hover .bracket-l { transform: translateX(-4px); }
        .terminal-btn:hover .bracket-r { transform: translateX(4px); }
        input:focus, textarea:focus, select:focus { outline: none; box-shadow: none !important; }
    </style>

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "outline": "#84967e",
                        "secondary": "#9ed492",
                        "on-surface-variant": "#b9ccb2",
                        "on-surface": "#dae6d2",
                        "surface": "#0c160a",
                        "outline-variant": "#3b4b37",
                        "terminal-dim": "#008F11",
                        "primary-fixed-dim": "#00e639",
                        "surface-container-highest": "#2d382a",
                        "surface-container": "#182216",
                        "primary": "#ebffe2",
                        "background": "#000000"
                    },
                    "fontFamily": {
                        "headline-md": ["JetBrains Mono"],
                        "headline-lg": ["JetBrains Mono"],
                        "code-sm": ["JetBrains Mono"],
                        "headline-lg-mobile": ["JetBrains Mono"],
                        "body-lg": ["JetBrains Mono"],
                        "body-md": ["JetBrains Mono"],
                        "label-md": ["JetBrains Mono"]
                    },
                    "fontSize": {
                        "headline-md": ["24px", {"lineHeight": "1.4", "fontWeight": "600"}],
                        "headline-lg": ["40px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "code-sm": ["12px", {"lineHeight": "1.4", "fontWeight": "400"}],
                        "headline-lg-mobile": ["32px", {"lineHeight": "1.2", "fontWeight": "700"}],
                        "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                        "body-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
                        "label-md": ["14px", {"lineHeight": "1.2", "letterSpacing": "0.1em", "fontWeight": "500"}]
                    },
                    "spacing": {
                        "margin": "32px",
                        "gutter": "24px",
                        "container-max": "1200px"
                    }
                }
            }
        }
    </script>
  </head>
  <body class="font-body-md text-body-md">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
